<!--
@name To-dos (JS)
@type vanilla
@icon ✅

Globals: db
-->

<h1>My Todos</h1>
<div class="row">
  <input id="field" type="text" placeholder="Add a task...">
  <button onclick="addTodo()">Add</button>
</div>
<ul id="list"></ul>

<style>
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=text] { flex: 1; padding: 10px; font-size: 1rem; border: 1px solid #8884; border-radius: 10px; }
  button { padding: 10px 14px; font-size: 1rem; border: 0; border-radius: 10px; background: #007aff; color: #fff; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { display: flex; align-items: center; gap: 10px; padding: 12px 4px; border-bottom: 1px solid #8883; }
  li.done span { text-decoration: line-through; opacity: 0.5; }
  li span { flex: 1; }
  .del { background: transparent; color: #ff3b30; padding: 4px 8px; }
</style>

<script>
  // A firebase-like collection. Every call returns a Promise that resolves
  // once native has persisted the change, so we await writes and re-render.
  var todos = db.collection("todos");

  async function render() {
    var items = await todos.list();
    var list = document.getElementById("list");
    list.innerHTML = "";
    items.forEach(function (t) {
      var li = document.createElement("li");
      if (t.done) li.className = "done";
      var box = document.createElement("input");
      box.type = "checkbox";
      box.checked = t.done;
      box.onchange = async function () {
        await todos.update(t.id, { done: box.checked });
        render();
      };
      var label = document.createElement("span");
      label.textContent = t.text;
      var del = document.createElement("button");
      del.className = "del";
      del.textContent = "Delete";
      del.onclick = async function () {
        await todos.remove(t.id);
        render();
      };
      li.appendChild(box);
      li.appendChild(label);
      li.appendChild(del);
      list.appendChild(li);
    });
  }

  async function addTodo() {
    var field = document.getElementById("field");
    var text = field.value.trim();
    if (!text) return;
    await todos.create({ text: text, done: false });
    field.value = "";
    render();
  }

  document.getElementById("field").addEventListener("keydown", function (e) {
    if (e.key === "Enter") addTodo();
  });

  render();
</script>
